<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <style>
      .bg { fill: #ece4d3; }
      .box { fill: #fffaf0; }
      .box-dark { fill: #1a1712; }
      .label { font-family: 'JetBrains Mono','Courier New',monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.22em; }
      .title { font-size: 22px; font-weight: 500; fill: #1a1712; }
      .body { font-size: 13px; fill: #3a342a; }
      .accent-text { fill: #6b2e15; }
      .muted { fill: #6b614e; }
      .arrow { fill: none; stroke: rgba(26,23,18,0.32); stroke-width: 1.5; marker-end: url(#ah); }
    </style>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(26,23,18,0.45)"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="400"/>

  <!-- Title row -->
  <text x="60" y="54" font-family="'JetBrains Mono','Courier New',monospace" font-size="10" font-weight="700" letter-spacing="0.28em" fill="#4d1f0d">IMAGE RESOLVER · FILE SYSTEM ACCESS API</text>
  <line x1="60" y1="68" x2="1140" y2="68" stroke="#1a1712" stroke-width="1.5"/>

  <!-- Step 1: Folder -->
  <rect x="60" y="100" width="200" height="180" rx="6" class="box" stroke="rgba(26,23,18,0.16)" stroke-width="1" fill="none"/>
  <rect x="60" y="100" width="200" height="180" rx="6" class="box"/>
  <rect x="60" y="100" width="200" height="180" rx="6" fill="none" stroke="rgba(26,23,18,0.16)" stroke-width="1"/>
  <text x="80" y="130" class="label" fill="#6b614e">FOLDER</text>
  <text x="80" y="162" class="body">my-notes/</text>
  <text x="80" y="184" class="body">  article.md</text>
  <text x="80" y="206" class="body">  images/</text>
  <text x="80" y="228" class="body" fill="#6b2e15">    chart.png</text>
  <text x="80" y="250" class="body" fill="#6b2e15">    photo.jpg</text>

  <!-- Arrow 1 -->
  <line x1="268" y1="190" x2="318" y2="190" class="arrow"/>

  <!-- Step 2: Parser -->
  <rect x="320" y="120" width="180" height="140" rx="6" class="box"/>
  <rect x="320" y="120" width="180" height="140" rx="6" fill="none" stroke="rgba(26,23,18,0.16)" stroke-width="1"/>
  <text x="340" y="150" class="label" fill="#6b614e">FSAccess</text>
  <text x="340" y="150" class="label" fill="#6b614e"> </text>
  <text x="340" y="170" class="label" fill="#6b614e">ADAPTER</text>
  <text x="340" y="200" font-size="12" fill="#3a342a">readBlob(path)</text>
  <text x="340" y="220" font-size="12" fill="#3a342a">→ Blob</text>
  <text x="340" y="240" font-size="12" fill="#6b614e">createObjectURL</text>

  <!-- Arrow 2 -->
  <line x1="508" y1="190" x2="558" y2="190" class="arrow"/>

  <!-- Step 3: Image Resolver -->
  <rect x="560" y="100" width="220" height="180" rx="6" fill="#1a1712"/>
  <rect x="560" y="100" width="220" height="180" rx="6" fill="none" stroke="rgba(26,23,18,0.32)" stroke-width="1"/>
  <text x="580" y="130" class="label" fill="rgba(242,236,224,0.5)">IMAGE RESOLVER</text>
  <text x="580" y="162" font-size="12" fill="rgba(242,236,224,0.75)">相對路徑</text>
  <text x="580" y="182" font-size="12" fill="rgba(242,236,224,0.75)">→ blob:// URL</text>
  <text x="580" y="210" font-size="11" fill="rgba(242,236,224,0.4)">lazy 解析 · 快取</text>
  <text x="580" y="230" font-size="11" fill="rgba(242,236,224,0.4)">切換文件自動撤銷</text>
  <text x="580" y="258" font-size="11" fill="rgba(107,46,21,0.8)">僅限 FSAccess 模式</text>

  <!-- Arrow 3 -->
  <line x1="788" y1="190" x2="838" y2="190" class="arrow"/>

  <!-- Step 4: ProseImage -->
  <rect x="840" y="100" width="300" height="180" rx="6" class="box"/>
  <rect x="840" y="100" width="300" height="180" rx="6" fill="none" stroke="rgba(107,46,21,0.25)" stroke-width="1.5"/>
  <text x="860" y="130" class="label" fill="#4d1f0d">PROSE IMAGE</text>
  <rect x="860" y="148" width="260" height="112" rx="6" fill="rgba(107,46,21,0.06)" stroke="rgba(107,46,21,0.15)" stroke-width="1"/>
  <text x="880" y="175" font-size="13" fill="#3a342a">![圖表](./images/chart.png)</text>
  <text x="880" y="200" font-size="12" fill="#6b614e">↓ 解析成功後渲染</text>
  <rect x="880" y="215" width="220" height="35" rx="4" fill="rgba(107,46,21,0.08)" stroke="rgba(107,46,21,0.15)" stroke-width="1"/>
  <text x="990" y="237" font-size="12" fill="#6b2e15" text-anchor="middle">圖片顯示於此</text>

  <!-- Bottom -->
  <line x1="60" y1="310" x2="1140" y2="310" stroke="rgba(26,23,18,0.16)" stroke-width="1"/>
  <text x="60" y="336" font-size="13" fill="#3a342a">使用方式：開啟本地資料夾（側邊欄 → 授權），markdown 中的相對路徑圖片即自動顯示。</text>
  <text x="60" y="360" font-size="12" fill="#6b614e" font-family="'JetBrains Mono','Courier New',monospace">外部 URL（https://...）在所有模式下均直接可用，不需要授權資料夾。</text>
</svg>
