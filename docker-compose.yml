services:
  app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      CHOKIDAR_USEPOLLING: "1"
      PNPM_STORE_DIR: /pnpm/store
    volumes:
      - ./frontend:/app
      - /app/.next
      - app_node_modules:/app/node_modules
      - app_pnpm_store:/pnpm/store
    command: ["pnpm", "dev", "--hostname", "0.0.0.0"]

volumes:
  app_node_modules:
  app_pnpm_store:
